project:
  name: example
  root: .
  orchestrator_runtime: codex

session:
  name: agent-bridge-dev
  pane_count: 3

agents:
  - id: codex
    runtime: codex
    pane: 0
    role: orchestrator
  - id: implementer
    runtime: opencode
    pane: 1
    role: implementation
  - id: reviewer
    runtime: claude
    pane: 2
    role: review

workflow:
  notification: mailbox
  require_local_verification: true
  handoff_format:
    implementation_summary: required
    changed_files: required
    verification_result: required
    reviewer_status: required
