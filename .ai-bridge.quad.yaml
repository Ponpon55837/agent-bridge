project:
  name: quad-example
  root: .
  orchestrator_runtime: codex

session:
  name: quad-ai
  pane_count: 4

agents:
  - id: codex
    runtime: codex
    pane: 0
    role: orchestrator
  - id: implementer-a
    runtime: opencode
    pane: 1
    role: implementation-a
  - id: implementer-b
    runtime: opencode
    pane: 2
    role: implementation-b
  - id: reviewer
    runtime: claude
    pane: 3
    role: review

workflow:
  notification: mailbox
  require_local_verification: true
